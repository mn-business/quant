name: Run 60-day New High Screener

on:
  schedule:
    # 매 47분마다
    - cron: "47 * * * *"  
  workflow_dispatch:
    # GitHub 웹 UI에서 수동으로도 즉시 실행 가능하도록 지원

permissions:
  contents: write # 파일 자동 커밋 & 푸시를 위한 쓰기 권한 허용

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 캐시 히스토리 동기화를 위해 전체 히스토리 로드

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # 패키지 캐싱으로 속도 향상

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Screener Script
        env:
          # 혹시 비밀 계정으로 변경할 경우 GitHub Secrets의 값을 환경 변수로 사용 가능
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python src/get_60day_high_krx.py
          python src/get_60day_high_yf.py
          # python src/get_60day_high_macro.py

      - name: Push results to Public Repository
        env:
          API_TOKEN_GITHUB: ${{ secrets.GH_PAT }}
        run: |
          # 1. Git 커밋 작성자 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 2. 발급한 토큰을 이용해 공개 레포지토리를 별도 임시 폴더(public-repo)에 복제(Clone)
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/mn-business/quant-pub.git public-repo

          # 3. 공개 레포지토리 내의 결과물 저장용 경로 생성
          mkdir -p public-repo/result/60day_high

          # 4. 방금 분석 가동되어 생성된 결과 CSV 파일들을 공개 레포지토리 폴더로 복사
          cp -r result/60day_high/* public-repo/result/60day_high/

          # 5. 공개 레포지토리 폴더 내부로 진입하여 변경사항 커밋 및 푸시
          cd public-repo
          git add result/60day_high/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: 60-day new high results ($(date +'%Y-%m-%d'))"
            git push origin main
          else
            echo "No changes to commit to the public repository."
          fi

      - name: Commit and Push changes to Private Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # db/ 하위 캐시들과 result/60day_high/ 하위의 새 결과 파일들을 스테이징
          git add db/*.csv result/60day_high/

          # 변경 사항이 있을 때만 커밋 및 푸시 진행
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: 60-day new high results ($(date +'%Y-%m-%d'))"
            git push origin main
          else
            echo "No changes to commit."
          fi
