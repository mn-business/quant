name: Run 60-day New High Screener

on:
  schedule:
    # 월~금요일 매일 16:30 KST (07:30 UTC)에 자동으로 실행
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    # GitHub 웹 UI에서 수동으로도 즉시 실행 가능하도록 지원

permissions:
  contents: write # 파일 자동 커밋 & 푸시를 위한 쓰기 권한 허용

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 캐시 히스토리 동기화를 위해 전체 히스토리 로드

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 패키지 캐싱으로 속도 향상

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas pykrx FinanceDataReader tqdm lxml openpyxl requests

    - name: Run Screener Script
      env:
        # 혹시 비밀 계정으로 변경할 경우 GitHub Secrets의 값을 환경 변수로 사용 가능
        KRX_ID: ${{ secrets.KRX_ID }}
        KRX_PW: ${{ secrets.KRX_PW }}
      run: |
        python src/get_60day_high_krx.py
        python src/get_60day_high_yf.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # db/ 하위 캐시들과 result/60day_high/ 하위의 새 결과 파일들을 스테이징
        git add db/*.csv result/60day_high/*.csv
        
        # 변경 사항이 있을 때만 커밋 및 푸시 진행
        if ! git diff --cached --quiet; then
          git commit -m "Auto-update: 60-day new high results ($(date +'%Y-%m-%d'))"
          git push origin main
        else
          echo "No changes to commit."
        fi
